<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Study Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #3b82f6; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #fff; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; font-size: 14px; }
        .badge { font-size: 24px; margin-right: 8px; display: inline-block; }
        button { background: var(--p); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-red { background: #ef4444; }
        input { width: calc(100% - 24px); padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; }
        .top-list { list-style: none; padding: 0; }
        .top-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="card" style="max-width: 400px; margin: 80px auto; text-align: center; display: none;">
        <h1>🎓 Study Monitor</h1>
        <p>Войдите через Google, чтобы начать</p>
        <button onclick="login()">Войти через Google</button>
    </div>

    <div id="app-screen" class="container" style="display: none;">
        <div class="main-content">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div>
                        <h2>Привет, <span id="user-name">...</span>!</h2>
                        <div id="achievements-list"></div>
                        <p>⏱ Время: <strong><span id="study-time">0</span> мин.</strong></p>
                    </div>
                    <button class="btn-red" onclick="logout()">Выйти</button>
                </div>
            </div>

            <div class="card">
                <h3>Общий чат 💬</h3>
                <div id="chat-box">Загрузка...</div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="chat-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button onclick="sendMsg()">></button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3>Рейтинг 🏆</h3>
                <ul id="leaderboard" class="top-list"></ul>
            </div>
        </div>
    </div>

    <script>
        // --- НАСТРОЙКИ ---
        const SB_URL = "https://uztmyzrkkjktpqabmbqj.supabase.co";
        const SB_KEY = "sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj";
        
        // Исправленная инициализация
        const { createClient } = supabase;
        const sb = createClient(SB_URL, SB_KEY);

        let user = null;
        let sessionStart = Date.now();

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                setupApp();
            } else {
                document.getElementById('auth-screen').style.display = 'block';
            }
        }

        async function login() {
            await sb.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: window.location.href } 
            });
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.reload();
        }

        async function setupApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'grid';

            // Проверка профиля
            let { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            
            if (!profile) {
                const { data: newProfile } = await sb.from('profiles').insert([
                    { id: user.id, username: user.email.split('@')[0], status: 'online' }
                ]).select().single();
                profile = newProfile;
            }

            document.getElementById('user-name').innerText = profile?.username || "Студент";
            
            updateUI();
            startTracking();
            subscribeRealtime();
        }

        function startTracking() {
            // Ранняя пташка
            if (new Date().getHours() < 8) award('early_bird');

            setInterval(async () => {
                // Обновляем время (простой способ через update)
                const { data: p } = await sb.from('profiles').select('total_study_time').eq('id', user.id).single();
                const newTime = (p?.total_study_time || 0) + 1;
                
                await sb.from('profiles').update({ total_study_time: newTime }).eq('id', user.id);
                document.getElementById('study-time').innerText = newTime;

                // Марафонец (через 120 мин сессии)
                if ((Date.now() - sessionStart) / 60000 >= 120) award('marathon');
                
                loadLeaderboard();
            }, 60000);
        }

        async function award(achId) {
            const { data } = await sb.from('user_achievements').select('*').eq('user_id', user.id).eq('achievement_id', achId);
            if (data && data.length === 0) {
                await sb.from('user_achievements').insert([{ user_id: user.id, achievement_id: achId }]);
                updateUI();
            }
        }

        async function updateUI() {
            const { data: profile } = await sb.from('profiles').select('total_study_time').eq('id', user.id).single();
            if (profile) document.getElementById('study-time').innerText = profile.total_study_time;

            const { data: achs } = await sb.from('user_achievements').select('achievements(icon, name)').eq('user_id', user.id);
            if (achs) {
                document.getElementById('achievements-list').innerHTML = achs.map(a => 
                    `<span class="badge" title="${a.achievements.name}">${a.achievements.icon}</span>`
                ).join('');
            }
            loadLeaderboard();
            loadMessages();
        }

        async function loadLeaderboard() {
            const { data } = await sb.from('profiles').select('username, total_study_time').order('total_study_time', { ascending: false }).limit(10);
            if (data) {
                document.getElementById('leaderboard').innerHTML = data.map(u => 
                    `<li><span>${u.username}</span> <b>${u.total_study_time}м</b></li>`
                ).join('');
            }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;

            await sb.from('messages').insert([{ user_id: user.id, content: input.value }]);
            input.value = '';

            const { count } = await sb.from('messages').select('*', { count: 'exact', head: true }).eq('user_id', user.id);
            if (count >= 20) award('activist');
        }

        async function loadMessages() {
            const { data } = await sb.from('messages').select('content, profiles(username)').order('created_at', { ascending: false }).limit(20);
            if (data) {
                document.getElementById('chat-box').innerHTML = data.reverse().map(m => `
                    <div class="msg"><b>${m.profiles?.username || 'Аноним'}:</b> ${m.content}</div>
                `).join('');
                const box = document.getElementById('chat-box');
                box.scrollTop = box.scrollHeight;
            }
        }

        function subscribeRealtime() {
            sb.channel('updates')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
            .subscribe();
        }

        init();
    </script>
</body>
</html>
