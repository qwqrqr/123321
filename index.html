<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study App | Tabs</title>
<style>
    :root {
        --primary: #6366f1; --bg: #f3f4f6; --card: #ffffff;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
    
    .main-container { width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; background: var(--card); }

    /* Шапка с профилем */
    .header { padding: 20px; border-bottom: 1px solid #eee; text-align: center; }
    #myInfo { font-weight: bold; color: var(--primary); margin-bottom: 10px; }

    /* Навигация (3 кнопки) */
    .nav-tabs { display: flex; border-bottom: 1px solid #eee; background: #fafafa; }
    .nav-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: 600; color: #64748b; transition: 0.3s; }
    .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #fff; }

    /* Контент вкладок */
    .tab-content { flex: 1; overflow-y: auto; padding: 20px; display: none; }
    .tab-content.active { display: block; }

    /* Стили для вкладок */
    .user-card { display: flex; align-items: center; padding: 12px; background: #f8fafc; border-radius: 12px; margin-bottom: 10px; }
    .badge-item { display: inline-block; padding: 10px; background: #eef2ff; border-radius: 10px; margin: 5px; border: 1px solid #c7d2fe; text-align: center; min-width: 100px; }
    
    /* Кнопки статуса внутри профиля */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-s { padding: 8px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background: white; }
    
    /* Чат */
    #chat-box { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; border: 1px solid #f0f0f0; padding: 10px; border-radius: 10px; }
    .msg { padding: 8px 12px; border-radius: 10px; background: #f1f5f9; align-self: flex-start; max-width: 80%; }
    .msg.mine { background: var(--primary); color: white; align-self: flex-end; }
    
    .hidden { display: none; }
</style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div id="myInfo">Авторизуйтесь через Google</div>
        <button id="loginBtn" onclick="login()" style="padding: 8px 20px; border-radius: 20px; border: none; background: #4285f4; color: white; cursor: pointer;">Войти</button>
        
        <div id="statusControl" class="hidden">
            <div class="status-grid">
                <button class="btn-s" onclick="changeStatus('📚 Учусь')">📚 Учусь</button>
                <button class="btn-s" onclick="changeStatus('☕ Кофе')">☕ Кофе</button>
                <button class="btn-s" onclick="changeStatus('🎮 В игре')">🎮 В игре</button>
                <button class="btn-s" onclick="endSession()">🛑 Стоп</button>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-btn active" onclick="openTab(event, 'chat-tab')">💬 Чат</button>
        <button class="nav-btn" onclick="openTab(event, 'rating-tab')">🏆 Рейтинг</button>
        <button class="nav-btn" onclick="openTab(event, 'achievements-tab')">🏅 Награды</button>
    </div>

    <div id="chat-tab" class="tab-content active">
        <div id="chat-box"></div>
        <div style="display:flex; gap: 5px;">
            <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="Сообщение...">
            <button onclick="sendMessage()" style="padding:10px; border-radius:10px; background:var(--primary); color:white; border:none;">-></button>
        </div>
    </div>

    <div id="rating-tab" class="tab-content">
        <h3>Топ по сообщениям</h3>
        <div id="rating-list">Загрузка...</div>
    </div>

    <div id="achievements-tab" class="tab-content">
        <h3>Мои значки</h3>
        <div id="my-badges-list" style="display: flex; flex-wrap: wrap; justify-content: center;">
            </div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://uztmyzrkkjktpqabmbqj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let MY_ID = null;
let MY_NAME = "";

// ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
window.openTab = (evt, tabName) => {
    const contents = document.getElementsByClassName("tab-content");
    for (let content of contents) content.classList.remove("active");
    
    const buttons = document.getElementsByClassName("nav-btn");
    for (let btn of buttons) btn.classList.remove("active");

    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");

    if(tabName === 'rating-tab') fetchRating();
    if(tabName === 'achievements-tab') fetchMyBadges();
}

// ЛОГИКА АВТОРИЗАЦИИ И ДАННЫХ
async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
        MY_ID = user.id;
        MY_NAME = user.user_metadata.full_name;
        document.getElementById('myInfo').innerText = `Привет, ${MY_NAME}!`;
        document.getElementById('loginBtn').classList.add('hidden');
        document.getElementById('statusControl').classList.remove('hidden');
        
        await supabase.from('profiles').upsert({ id: MY_ID, username: MY_NAME, is_online: true });
        loadChat();
        listenRealtime();
    }
}

// ЧАТ
window.sendMessage = async () => {
    const input = document.getElementById('chat-input');
    if (!input.value.trim()) return;
    await supabase.from('messages').insert({ user_id: MY_ID, username: MY_NAME, text: input.value });
    
    // Плюс 1 к рейтингу
    const { data: p } = await supabase.from('profiles').select('message_count').eq('id', MY_ID).single();
    await supabase.from('profiles').update({ message_count: (p.message_count || 0) + 1 }).eq('id', MY_ID);
    
    input.value = '';
};

async function loadChat() {
    const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
    const box = document.getElementById('chat-box');
    box.innerHTML = data.reverse().map(m => `
        <div class="msg ${m.user_id === MY_ID ? 'mine' : ''}">
            <div style="font-size:10px; font-weight:bold;">${m.username}</div>
            ${m.text}
        </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
}

// РЕЙТИНГ
async function fetchRating() {
    const { data } = await supabase.from('profiles').select('*').order('message_count', { ascending: false });
    document.getElementById('rating-list').innerHTML = data.map((u, i) => `
        <div class="user-card">
            <span style="margin-right:10px; font-weight:bold;">#${i+1}</span>
            <div style="flex:1"><b>${u.username}</b><br><small>${u.status || 'Отдыхает'}</small></div>
            <div style="color:var(--primary)">${u.message_count || 0} сообщений</div>
        </div>
    `).join('');
}

// ДОСТИЖЕНИЯ
async function fetchMyBadges() {
    const { data } = await supabase.from('user_achievements').select('*').eq('user_id', MY_ID);
    const list = document.getElementById('my-badges-list');
    if (data.length === 0) {
        list.innerHTML = "<p>У вас пока нет наград. Будьте активнее!</p>";
    } else {
        list.innerHTML = data.map(a => `
            <div class="badge-item">
                <div style="font-size: 24px;">🏅</div>
                <div style="font-size: 12px; font-weight:bold;">${a.achievement_name}</div>
            </div>
        `).join('');
    }
}

// ОБЩИЕ ФУНКЦИИ
window.changeStatus = async (status) => {
    await supabase.from('profiles').update({ status, status_start: new Date().toISOString() }).eq('id', MY_ID);
};

window.endSession = async () => {
    await supabase.from('profiles').update({ status: '', status_start: null }).eq('id', MY_ID);
};

function listenRealtime() {
    supabase.channel('room1').on('postgres_changes', { event: 'INSERT', table: 'messages' }, loadChat).subscribe();
}

window.login = () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });

init();
</script>

</body>
</html>
