<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Monitor Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --bg:#0f111a; --card:#1a1d29; --p:#3b82f6; --acc:#22c55e; --text:#fff; --dim:#94a3b8; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI'; margin:0; padding:15px; display:flex; justify-content:center;}
.wrapper { width:100%; max-width:420px;}
.card { background:var(--card); border-radius:20px; padding:20px; margin-bottom:15px;}
.label { font-size:10px; color:var(--dim); margin-bottom:12px; display:block;}

.timer-big { text-align:center; font-size:54px; font-weight:800; color:var(--acc);}
.timer-big span { font-size:20px; color:var(--dim);}

.btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.btn { padding:12px; border-radius:12px; border:none; cursor:pointer;}
.btn-play { background:rgba(34,197,94,0.15); color:var(--acc);}
.btn-stop { background:rgba(239,68,68,0.15); color:#ef4444;}
.btn-exit { background:#2d313f; color:var(--dim); grid-column:span 2;}

.status-select { display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.st-btn { background:#242838; padding:10px; border-radius:12px; cursor:pointer; color:var(--dim);}
.st-btn.active { border:1px solid var(--p); color:#fff;}

.hidden { display:none;}
.avatar { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#3b82f6,#22c55e); display:flex; align-items:center; justify-content:center;}
</style>
</head>

<body>
<div class="wrapper">

<div id="auth-screen" class="card">
<button onclick="login()">Войти через Google</button>
</div>

<div id="main-app" class="hidden">

<div class="card">
<p id="user-name-top"></p>
<div class="timer-big"><span id="timer-val">0</span> сек.</div>
<div id="current-mode">☕ Перерыв</div>

<div class="btn-grid">
<button onclick="startTimer()">📖 Учиться</button>
<button onclick="saveTimer()">✔ Завершить</button>
<button class="btn-exit" onclick="logout()">Выйти</button>
</div>
</div>

<div class="card">
<div style="display:flex; gap:10px;">
<div class="avatar" id="user-ava"></div>
<div>
<b id="user-full-name"></b><br>
<span id="user-email-text"></span><br>
<span id="user-status-text"></span>
</div>
</div>

<div class="status-select">
<button id="st-online" class="st-btn" onclick="setStatus(this,'online')">🟢 В сети</button>
<button id="st-away" class="st-btn" onclick="setStatus(this,'away')">🟡 Отошёл</button>
<button id="st-busy" class="st-btn" onclick="setStatus(this,'busy')">🔴 Занят</button>
<button id="st-coffee" class="st-btn" onclick="setStatus(this,'coffee')">☕ Кофе</button>
</div>
</div>

</div>
</div>

<script>
const SB_URL="https://uztmyzrkkjktpqabmbqj.supabase.co";
const SB_KEY="sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj";

const sb=supabase.createClient(SB_URL,SB_KEY);

let user,timer=null,secs=0;

async function init(){
const {data:{session}}=await sb.auth.getSession();
if(session){
user=session.user;
await syncProfile();
showApp();
}else{
document.getElementById('auth-screen').classList.remove('hidden');
}
}

async function login(){
await sb.auth.signInWithOAuth({provider:'google'});
}

async function logout(){
await sb.auth.signOut();
location.reload();
}

async function syncProfile(){
const {data}=await sb.from('profiles').select('*').eq('id',user.id).single();
if(!data){
await sb.from('profiles').insert({
id:user.id,
username:user.email,
status:'online',
total_study_time:0
});
}
}

async function showApp(){
document.getElementById('auth-screen').classList.add('hidden');
document.getElementById('main-app').classList.remove('hidden');

document.getElementById('user-name-top').innerText=user.email;
document.getElementById('user-full-name').innerText=user.email;
document.getElementById('user-email-text').innerText=user.email;
document.getElementById('user-ava').innerText=user.email[0];

await loadMyStatus();
}

function startTimer(){
if(timer) return;
document.getElementById('current-mode').innerText="📖 Учусь";
updateStatusText("study");

timer=setInterval(()=>{
secs++;
document.getElementById('timer-val').innerText=secs;
},1000);
}

async function saveTimer(){
if(!timer) return;
clearInterval(timer);
timer=null;

await sb.from('profiles')
.update({total_study_time:secs})
.eq('id',user.id);

secs=0;
document.getElementById('timer-val').innerText=0;
document.getElementById('current-mode').innerText="☕ Перерыв";
}

async function setStatus(btn,status){
document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

await sb.from('profiles').update({status}).eq('id',user.id);

updateStatusText(status);
}

function updateStatusText(status){
const map={
online:"🟢 В сети",
away:"🟡 Отошёл",
busy:"🔴 Занят",
coffee:"☕ Кофе",
study:"📖 Учусь"
};
document.getElementById('user-status-text').innerText=map[status]||"";
}

async function loadMyStatus(){
const {data}=await sb.from('profiles').select('status').eq('id',user.id).single();

if(data){
updateStatusText(data.status);

const btn=document.getElementById('st-'+data.status);
if(btn) btn.classList.add('active');
}
}

init();
</script>

</body>
</html>
