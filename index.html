<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Монитор статусов</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  background: #fff;
  border-radius: 20px;
  padding: 25px;
  width: 400px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

h2 { margin: 0 0 15px; }
#myInfo { margin-bottom: 15px; color: #3b82f6; font-weight: bold; }

.buttons { display: flex; gap: 10px; margin-bottom: 20px; }

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.green { background: #22c55e; }
.orange { background: #f97316; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }

#loginBtn { background: #2563eb; width: 100%; margin-bottom: 10px; }
#logoutBtn { background: #ef4444; width: 100%; margin-bottom: 10px; }

.hidden { display: none; }

.user-item {
  display: flex;
  align-items: center;
  background: #f9fafb;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-right: 10px;
}

.username { font-weight: bold; }
.status { font-size: 0.85rem; color: gray; }
</style>
</head>

<body>

<div class="container">

  <h2>👤 Мой профиль</h2>
  <div id="myInfo">Не авторизован</div>

  <div class="buttons hidden" id="statusButtons">
    <button class="green" onclick="changeStatus('Учусь')">Учусь</button>
    <button class="orange" onclick="changeStatus('Кофе')">Кофе</button>
    <button class="red" onclick="changeStatus('В игре')">В игре</button>
    <button class="blue" onclick="changeStatus('Дома')">Дома</button>
  </div>

  <button id="loginBtn" onclick="login()">Войти через Google</button>
  <button id="logoutBtn" class="hidden" onclick="logout()">Выйти</button>

  <h2>👥 Группа</h2>
  <div id="grouplist">Загрузка...</div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// ----------------------------
// Настройки Supabase
// ----------------------------
const supabase = createClient(
  'https://uztmyzrkkjktpqabmbqj.supabase.co',        // твой Supabase URL
  'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj' // твой anon ключ
);

let MY_ID = null;

// ----------------------------
// LOGIN
// ----------------------------
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://qwqrqr.github.io/123321/' // твой путь GitHub Pages
    }
  });
};

// ----------------------------
// LOGOUT
// ----------------------------
window.logout = async () => {
  if (MY_ID) {
    await supabase.from('profiles')
      .update({ is_online: false })
      .eq('id', MY_ID);
  }

  await supabase.auth.signOut();
  location.reload();
};

// ----------------------------
// GET USER
// ----------------------------
async function getUser() {
  const { data: { user } } = await supabase.auth.getUser();

  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const statusButtons = document.getElementById('statusButtons');

  if (user) {
    MY_ID = user.id;

    document.getElementById('myInfo').innerText =
      `Вы: ${user.user_metadata.full_name}`;

    loginBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
    statusButtons.classList.remove('hidden');

    await supabase.from('profiles').upsert({
      id: user.id,
      username: user.user_metadata.full_name,
      status: '',
      is_online: true
    });

    fetchGroup();
  } else {
    loginBtn.classList.remove('hidden');
    logoutBtn.classList.add('hidden');
    statusButtons.classList.add('hidden');
  }
}

// ----------------------------
// CHANGE STATUS
// ----------------------------
window.changeStatus = async (text) => {
  if (!MY_ID) return;

  let data = { status: text };

  if (text === 'Учусь') {
    data.study_start = new Date().toISOString();
  } else {
    data.study_start = null;
  }

  await supabase.from('profiles')
    .update(data)
    .eq('id', MY_ID);

  fetchGroup();
};

// ----------------------------
// FORMAT TIMER
// ----------------------------
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}м ${s}с`;
}

// ----------------------------
// LOAD USERS
// ----------------------------
async function fetchGroup() {
  const { data } = await supabase
    .from('profiles')
    .select('*');

  const now = new Date();

  document.getElementById('grouplist').innerHTML =
    data.map(user => {

      let timer = '';

      if (user.status === 'Учусь' && user.study_start) {
        const diff = Math.floor((now - new Date(user.study_start)) / 1000);
        timer = `⏱ ${formatTime(diff)}`;
      }

      return `
      <div class="user-item">
        <div class="status-dot"
          style="background:${user.is_online ? '#22c55e' : '#9ca3af'}">
        </div>

        <div>
          <div class="username">${user.username}</div>
          <div class="status">${user.status || 'Нет статуса'} ${timer}</div>
        </div>
      </div>
      `;
    }).join('');
}

// ----------------------------
// CLOSE TAB
// ----------------------------
window.addEventListener('beforeunload', async () => {
  if (MY_ID) {
    await supabase.from('profiles')
      .update({ is_online: false })
      .eq('id', MY_ID);
  }
});

// ----------------------------
// START
// ----------------------------
getUser();
setInterval(fetchGroup, 1000);

</script>

</body>
</html>
