<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Monitor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f111a; --card: #1a1d29; --p: #3b82f6; --acc: #22c55e; --text: #ffffff; --dim: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 420px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .timer-big { text-align: center; font-size: 54px; font-weight: 800; color: var(--acc); margin: 10px 0; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-play { background: rgba(34,197,94,0.15); color: var(--acc); border: 1px solid var(--acc); }
        .btn-stop { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }
        .status-select { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .st-btn { background: #242838; padding: 12px; border-radius: 12px; font-size: 13px; border: 1px solid transparent; cursor: pointer; color: var(--dim); transition: 0.3s; }
        .st-btn.active { border-color: var(--p); background: rgba(59,130,246,0.2); color: #fff; transform: scale(1.02); }
        .tabs-nav { display: flex; background: #141721; border-radius: 12px; padding: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: var(--dim); cursor: pointer; font-size: 12px; border-radius: 8px; }
        .tab-btn.active { background: #2d313f; color: #fff; }
        #chat-box { height: 200px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
        .chat-msg { margin-bottom: 8px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; border-left: 3px solid var(--p); }
        .chat-msg b { color: var(--p); display: block; font-size: 11px; }
        .hidden { display: none !important; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #3b82f6, #22c55e); display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="auth-screen" class="card" style="text-align: center; margin-top: 100px;">
        <h1>REALTIME MONITOR</h1>
        <button class="btn btn-play" onclick="login()" style="width: 100%; margin-top: 20px;">Выбрать почту Google</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="card">
            <span class="label">Моя активность</span>
            <div style="text-align: center;">
                <p id="user-name-top" style="margin: 0; font-weight: 700; font-size: 20px;"></p>
                <div class="timer-big"><span id="timer-val">0</span><small style="font-size: 15px; color: var(--dim);"> сек</small></div>
                <div id="current-mode-text" style="color: #fbbf24; font-weight: bold;">☕ ОТДЫХАЮ</div>
            </div>
            <div class="btn-grid" style="margin-top: 15px;">
                <button class="btn btn-play" onclick="startStudy()"><i class="fa-solid fa-play"></i> Учиться</button>
                <button class="btn btn-stop" onclick="stopStudy()"><i class="fa-solid fa-check"></i> Завершить</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 15px;">
                <div class="avatar" id="user-ava">?</div>
                <div>
                    <b id="user-full-name"></b><br>
                    <span id="user-email-text" style="font-size: 11px; color: var(--dim);"></span>
                </div>
            </div>
            <div class="status-select">
                <button id="btn-online" class="st-btn active" onclick="updateStatus('online', this)">🟢 В сети</button>
                <button id="btn-away" class="st-btn" onclick="updateStatus('away', this)">🟡 Отошёл</button>
                <button id="btn-busy" class="st-btn" onclick="updateStatus('busy', this)">🔴 Занят</button>
                <button id="btn-coffee" class="st-btn" onclick="updateStatus('coffee', this)">☕ Кофе</button>
            </div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'tab-chat')">Чат</button>
            <button class="tab-btn" onclick="switchTab(this, 'tab-rank')">Рейтинг</button>
        </div>

        <div id="tab-chat" class="tab-content card">
            <div id="chat-box"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="chat-in" style="flex:1; background: #0f111a; border: 1px solid #2d313f; color: white; padding: 10px; border-radius: 10px;" placeholder="Сообщение...">
                <button onclick="sendMsg()" class="btn btn-play">></button>
            </div>
        </div>

        <div id="tab-rank" class="tab-content card hidden">
            <div id="leader-list"></div>
        </div>
        
        <button class="btn" style="background: #2d313f; color: white; width: 100%;" onclick="logout()">Выйти</button>
    </div>
</div>

<script>
    const SB_URL = "https://uztmyzrkkjktpqabmbqj.supabase.co";
    const SB_KEY = "ТВОЙ_ANON_KEY"; 
    const { createClient } = supabase;
    const sb = createClient(SB_URL, SB_KEY);

    let user = null, timer = null, secs = 0;

    // ГЛАВНАЯ ФУНКЦИЯ ЗАПУСКА
    async function init() {
        // 1. Проверяем, есть ли уже активная сессия
        const { data: { session } } = await sb.auth.getSession();
        
        if (session) {
            user = session.user;
            await checkProfile();
            showApp();
        }

        // 2. СЛУШАТЕЛЬ: Ловит момент, когда ты выбрал почту и вернулся на сайт
        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session) {
                user = session.user;
                await checkProfile();
                showApp();
            }
            if (event === 'SIGNED_OUT') {
                location.reload();
            }
        });
    }

    async function login() { 
        const { error } = await sb.auth.signInWithOAuth({ 
            provider: 'google',
            options: { 
                queryParams: { prompt: 'select_account' },
                redirectTo: window.location.origin + window.location.pathname // Возвращает на ту же страницу
            }
        }); 
        if (error) alert("Ошибка входа: " + error.message);
    }

    // Остальные функции (checkProfile, showApp, и т.д.) остаются без изменений

    async function logout() { await sb.auth.signOut(); location.reload(); }

    async function checkProfile() {
        const name = user.user_metadata.full_name || "Студент";
        const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
        if (!data) {
            await sb.from('profiles').insert([{ id: user.id, username: name, total_study_time: 0, status: 'online' }]);
        }
    }

    function showApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        const name = user.user_metadata.full_name || "Студент";
        document.getElementById('user-name-top').innerText = name;
        document.getElementById('user-full-name').innerText = name;
        document.getElementById('user-email-text').innerText = user.email;
        document.getElementById('user-ava').innerText = name[0];

        loadMessages();
        loadLeaderboard();
        
        // ВКЛЮЧАЕМ РЕАЛТАЙМ (ВАЖНО!)
        sb.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, loadMessages).subscribe();
        sb.channel('any2').on('postgres_changes', {event:'*', schema:'public', table:'profiles'}, loadLeaderboard).subscribe();
    }

    // ЛОГИКА ТАЙМЕРА И СТАТУСА
    function startStudy() {
        if (timer) return;
        document.getElementById('current-mode-text').innerText = "📖 УЧУСЬ";
        document.getElementById('current-mode-text').style.color = "#22c55e";
        updateStatus('online', document.getElementById('btn-online')); // Меняем статус на "В сети"
        timer = setInterval(() => { secs++; document.getElementById('timer-val').innerText = secs; }, 1000);
    }

    async function stopStudy() {
        if (!timer) return;
        clearInterval(timer); timer = null;
        const mins = Math.max(1, Math.floor(secs / 60));
        
        const { data } = await sb.from('profiles').select('total_study_time').eq('id', user.id).single();
        await sb.from('profiles').update({ total_study_time: (data.total_study_time || 0) + mins, status: 'coffee' }).eq('id', user.id);
        
        secs = 0;
        document.getElementById('timer-val').innerText = 0;
        document.getElementById('current-mode-text').innerText = "☕ ОТДЫХАЮ";
        document.getElementById('current-mode-text').style.color = "#fbbf24";
        updateStatus('coffee', document.getElementById('btn-coffee')); // Визуально меняем кнопку на Кофе
    }

    async function updateStatus(status, btn) {
        document.querySelectorAll('.st-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Сохраняем в Supabase
        await sb.from('profiles').update({ status: status }).eq('id', user.id);
    }

    async function sendMsg() {
        const inp = document.getElementById('chat-in');
        if (!inp.value.trim()) return;
        await sb.from('messages').insert({ user_id: user.id, content: inp.value });
        inp.value = '';
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('content, profiles(username)').order('created_at', {ascending:false}).limit(15);
        if (data) {
            document.getElementById('chat-box').innerHTML = data.reverse().map(m => `
                <div class="chat-msg"><b>${m.profiles?.username || 'Аноним'}</b>${m.content}</div>
            `).join('');
            const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight;
        }
    }

    async function loadLeaderboard() {
        const { data } = await sb.from('profiles').select('*').order('total_study_time', {ascending:false});
        if (data) {
            document.getElementById('leader-list').innerHTML = data.map(u => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #2d313f">
                    <span>${u.username} (${u.status})</span><b>${u.total_study_time}м</b>
                </div>
            `).join('');
        }
    }

    function switchTab(btn, tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.remove('hidden');
    }

    init();
</script>
</body>
</html>
