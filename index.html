<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Space</title>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;text-align:center}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#6366f1;color:white}
#chat-box{height:200px;overflow:auto;border:1px solid #333;margin:10px;padding:10px}
.msg{margin:5px}
.me{color:#22c55e}
</style>
</head>

<body>

<div id="login">
<h2>Study Space</h2>
<button onclick="login()">Войти через Google</button>
</div>

<div id="app" style="display:none">

<h3 id="name"></h3>

<button onclick="startStudy()">Начать</button>
<button onclick="stopStudy()">Стоп</button>

<h1 id="timer"></h1>

<hr>

<div id="chat-box"></div>

<input id="msg">
<button onclick="send()">Отправить</button>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
'https://uztmyzrkkjktpqabmbqj.supabase.co',
'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj'
);

let MY_ID=null;
let startTime=null;
let timer=null;
let sessionId=null;

// LOGIN
window.login = async ()=>{
await supabase.auth.signInWithOAuth({provider:'google'});
};

// INIT
async function init(){
const {data:{session}}=await supabase.auth.getSession();
if(session) onUser(session.user);

supabase.auth.onAuthStateChange((e,s)=>{
if(s) onUser(s.user);
});
}

// USER
async function onUser(user){
MY_ID=user.id;

document.getElementById('login').style.display='none';
document.getElementById('app').style.display='block';

document.getElementById('name').innerText =
user.user_metadata.full_name || user.email;

// profile
await supabase.from('profiles').upsert({
id:MY_ID,
username:user.user_metadata.full_name || user.email
});

loadChat();
}

// START
window.startStudy = async ()=>{
startTime=new Date();

const {data}=await supabase
.from('study_sessions')
.insert({
user_id:MY_ID,
start_time:startTime.toISOString()
})
.select()
.single();

sessionId=data.id;

timer=setInterval(()=>{
const now=new Date();
const diff=now-startTime;
const s=Math.floor(diff/1000);
document.getElementById('timer').innerText=s+" сек";
},1000);
};

// STOP
window.stopStudy = async ()=>{
clearInterval(timer);

const end=new Date();
const duration=Math.floor((end-startTime)/1000);

await supabase
.from('study_sessions')
.update({
end_time:end.toISOString(),
duration
})
.eq('id',sessionId);

document.getElementById('timer').innerText='';
};

// CHAT SEND
window.send = async ()=>{
const input=document.getElementById('msg');
if(!input.value) return;

const {data:userData}=await supabase.auth.getUser();

await supabase.from('messages').insert({
user_id:MY_ID,
username:userData.user.email,
text:input.value,
created_at:new Date().toISOString()
});

input.value='';
loadChat();
};

// LOAD CHAT
async function loadChat(){
const {data}=await supabase.from('messages')
.select('*')
.order('created_at',{ascending:false})
.limit(20);

const box=document.getElementById('chat-box');

box.innerHTML=data.reverse().map(m=>`
<div class="msg ${m.user_id===MY_ID?'me':''}">
${m.username}: ${m.text}
</div>
`).join('');
}

init();
</script>

</body>
</html>
