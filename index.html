<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Монитор статусов</title>
<style>
/* ... оставляем твои стили без изменений ... */
</style>
</head>
<body>

<div class="container">

  <h2>👤 Мой профиль</h2>
  <div id="myInfo">Загрузка...</div>

  <div class="buttons">
    <button class="green" onclick="changeStatus('Учусь','green')">Учусь</button>
    <button class="orange" onclick="changeStatus('Кофе','orange')">Кофе</button>
    <button class="red" onclick="changeStatus('В игре','red')">В игре</button>
    <button class="blue" onclick="changeStatus('Дома','blue')">Дома</button>
  </div>

  <button onclick="login()">Войти через Google</button>
  <button onclick="logout()">Выйти</button>

  <h2>👥 Группа</h2>
  <div id="grouplist" class="user-list">Загрузка...</div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// Supabase
const URL = 'https://uztmyzrkkjktpqabmbqj.supabase.co';
const KEY = 'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj';
const supabase = createClient(URL, KEY);

// Текущий пользователь
let MY_ID = null;

// 🔹 Вход через Google
window.login = async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google'
  });
  if (error) console.error("Ошибка входа:", error);
};

// 🔹 Выход
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

// 🔹 Получаем пользователя
async function getUser() {
  const { data: { user } } = await supabase.auth.getUser();

  if (user) {
    MY_ID = user.id;
    document.getElementById('myInfo').innerText = `Вы: ${user.user_metadata.full_name}`;

    // Добавляем в таблицу profiles, если ещё нет
    const { error } = await supabase.from('profiles').upsert({
      id: user.id,
      username: user.user_metadata.full_name,
      status: '' // пустой статус при первом входе
    });
    if (error) console.error(error);

    fetchGroup();
  } else {
    document.getElementById('myInfo').innerText = 'Не авторизован';
  }
}

// 🔹 Смена статуса
window.changeStatus = async (text, color) => {
  if (!MY_ID) {
    alert("Сначала войдите через Google!");
    return;
  }
  const { error } = await supabase
    .from('profiles')
    .update({ status: text })
    .eq('id', MY_ID);

  if (error) {
    alert("Ошибка при обновлении статуса!");
    console.error(error);
  } else {
    fetchGroup();
  }
};

// 🔹 Загрузка пользователей
async function fetchGroup() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const list = document.getElementById('grouplist');
  list.innerHTML = data.map(user => `
    <div class="user-item">
      <div class="status-dot" style="background: ${getColor(user.status)}"></div>
      <div>
        <div class="username">${user.username}</div>
        <div class="status">${user.status || "Нет статуса"}</div>
      </div>
    </div>
  `).join('');
}

// 🔹 Цвет по статусу
function getColor(status) {
  switch(status) {
    case 'Учусь': return '#22c55e';
    case 'Кофе': return '#f97316';
    case 'В игре': return '#ef4444';
    case 'Дома': return '#3b82f6';
    default: return '#9ca3af';
  }
}

// 🔹 Проверяем, есть ли пользователь при загрузке
getUser();
setInterval(fetchGroup, 5000);

</script>

</body>
</html>
