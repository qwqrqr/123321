<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чат + Статусы</title>

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2ff,#f5f5f5);
  display:flex;
  justify-content:center;
  padding:30px;
}

.container {
  width:420px;
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2 { margin:12px 0 6px; }

#myInfo { color:#3b82f6; font-weight:bold; }

.badges { display:flex; gap:5px; flex-wrap:wrap; }
.badge {
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  padding:3px 7px;
  border-radius:10px;
  font-size:11px;
}

.buttons { display:flex; flex-wrap:wrap; gap:5px; margin:10px 0; }

button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.green{background:#22c55e;}
.orange{background:#f97316;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
.yellow{background:#FACC15;color:#111;}
.black{background:#111827;}

.hidden{display:none;}

#chatBox {
  height:180px;
  overflow:auto;
  background:#fafafa;
  padding:10px;
  border-radius:10px;
  border:1px solid #eee;
}

.chat-row { display:flex; gap:5px; margin-top:5px; }
.chat-row input { flex:1; padding:6px; }

.user-item {
  display:flex;
  align-items:center;
  background:#f9fafb;
  padding:8px;
  border-radius:10px;
  margin-bottom:5px;
}

.dot {
  width:10px;height:10px;border-radius:50%;margin-right:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>👤 Профиль</h2>
<div id="myInfo">Не авторизован</div>
<div id="badges" class="badges"></div>

<div id="buttons" class="buttons hidden">
<button class="green" onclick="setStatus('Учусь')">Учусь</button>
<button class="orange" onclick="setStatus('Кофе')">Кофе</button>
<button class="red" onclick="setStatus('В игре')">Игра</button>
<button class="blue" onclick="setStatus('Дома')">Дома</button>
<button class="yellow" onclick="setStatus('Перерыв')">Перерыв</button>
<button class="black" onclick="stop()">Стоп</button>
</div>

<button id="login" onclick="login()">Войти</button>
<button id="logout" class="hidden" onclick="logout()">Выйти</button>

<h2>💬 Чат</h2>
<div id="chatBox"></div>
<div id="chatInput" class="chat-row hidden">
<input id="msg">
<button onclick="send()">></button>
</div>

<h2>👥 Группа</h2>
<div id="group"></div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
'https://uztmyzrkkjktpqabmbqj.supabase.co',
'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj'
);

let uid=null,name='';

// AUTH
window.login=()=>supabase.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href}});
window.logout=async()=>{
 if(uid) await supabase.from('profiles').update({is_online:false}).eq('id',uid);
 await supabase.auth.signOut(); location.reload();
};

// USER
async function init(){
 const {data:{user}}=await supabase.auth.getUser();
 if(!user)return;

 uid=user.id; name=user.user_metadata.full_name;

 myInfo.innerText='Вы: '+name;
 login.classList.add('hidden');
 logout.classList.remove('hidden');
 buttons.classList.remove('hidden');
 chatInput.classList.remove('hidden');

 await supabase.from('profiles').upsert({
  id:uid, username:name, is_online:true
 });
}

// STATUS
window.setStatus=async(t)=>{
 await supabase.from('profiles')
  .update({status:t,status_start:new Date().toISOString()})
  .eq('id',uid);
};

window.stop=async()=>{
 await supabase.from('profiles')
  .update({status:'',status_start:null})
  .eq('id',uid);
};

// TIME
function time(s){
 const m=Math.floor(s/60),sec=s%60;
 return m+'м '+sec+'с';
}

// CHAT
window.send=async()=>{
 if(!msg.value)return;

 await supabase.from('messages').insert({
  user_id:uid, username:name, text:msg.value
 });

 // счетчик
 const {data:p}=await supabase.from('profiles')
  .select('message_count').eq('id',uid).single();

 await supabase.from('profiles')
  .update({message_count:(p.message_count||0)+1})
  .eq('id',uid);

 msg.value='';
};

// LOAD
async function load(){
 const {data:users}=await supabase.from('profiles').select('*');
 const {data:msgs}=await supabase.from('messages').select('*').order('created_at',{ascending:false}).limit(20);
 const {data:ach}=await supabase.from('user_achievements').select('*');

 const now=new Date();

 group.innerHTML=users.map(u=>{
  let t='';
  if(u.status_start){
   let d=Math.floor((now-new Date(u.status_start))/1000);
   t=' ⏱ '+time(d);
  }
  return `<div class="user-item">
  <div class="dot" style="background:${u.is_online?'green':'gray'}"></div>
  <div>${u.username}<br><small>${u.status||'-'}${t}</small></div>
  </div>`;
 }).join('');

 chatBox.innerHTML=msgs.reverse().map(m=>
  `<div><b>${m.username}:</b> ${m.text}</div>`
 ).join('');

 badges.innerHTML=ach
  .filter(a=>a.user_id===uid)
  .map(a=>`<div class="badge">${a.achievement_name}</div>`)
  .join('');
}

setInterval(load,1000);
init();
</script>

</body>
</html>
