<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Monitor Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {background:#0f111a;color:white;font-family:sans-serif;padding:20px}
.card{background:#1a1d29;padding:15px;border-radius:15px;margin-bottom:10px}
button{margin:3px;padding:6px 10px;border:none;border-radius:8px;cursor:pointer}
.chat-msg{background:#222;padding:8px;border-radius:8px;margin-bottom:5px}
.hidden{display:none}
</style>
</head>

<body>

<div id="auth-screen" class="card">
<button onclick="login()">Войти через Google</button>
</div>

<div id="main-app" class="hidden">

<div class="card">
<div id="current-mode">☕ Перерыв</div>
<div><span id="timer-val">0</span> сек</div>

<button onclick="startTimer()">📖 Учиться</button>
<button onclick="saveTimer()">✔ Завершить</button>
<button onclick="logout()">Выйти</button>
</div>

<div class="card">
<div id="user-email-text"></div>
<div id="user-status-text"></div>

<button onclick="setStatus('online')">🟢 В сети</button>
<button onclick="setStatus('away')">🟡 Отошёл</button>
<button onclick="setStatus('busy')">🔴 Занят</button>
<button onclick="setStatus('coffee')">☕ Кофе</button>
<button onclick="setStatus('study')">📖 Учусь</button>
</div>

<div class="card">
<div id="chat-box"></div>
<input id="chat-in">
<button onclick="sendMsg()">Отправить</button>
</div>

</div>

<script>
const SB_URL="https://uztmyzrkkjktpqabmbqj.supabase.co";
const SB_KEY="sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj";
const sb=supabase.createClient(SB_URL,SB_KEY);

let user,timer=null,secs=0;

async function init(){
const {data:{session}}=await sb.auth.getSession();
if(session){
user=session.user;
await syncProfile();
showApp();
}else{
document.getElementById('auth-screen').classList.remove('hidden');
}
}

async function login(){
await sb.auth.signInWithOAuth({provider:'google'});
}

async function logout(){
await sb.auth.signOut();
location.reload();
}

async function syncProfile(){
const {data}=await sb.from('profiles').select('*').eq('id',user.id).single();
if(!data){
await sb.from('profiles').insert({
id:user.id,
username:user.email,
status:'online',
total_study_time:0
});
}
}

async function showApp(){
document.getElementById('auth-screen').classList.add('hidden');
document.getElementById('main-app').classList.remove('hidden');

document.getElementById('user-email-text').innerText=user.email;

await loadMyStatus();
loadMessages();
}

function startTimer(){
if(timer) return;

document.getElementById('current-mode').innerText="📖 Учусь";
updateStatusText("study");

sb.from('profiles').update({status:'study'}).eq('id',user.id);

timer=setInterval(()=>{
secs++;
document.getElementById('timer-val').innerText=secs;
},1000);
}

function saveTimer(){
if(!timer) return;
clearInterval(timer);
timer=null;

secs=0;
document.getElementById('timer-val').innerText=0;

document.getElementById('current-mode').innerText="☕ Перерыв";
updateStatusText("coffee");
}

async function setStatus(status){
await sb.from('profiles').update({status}).eq('id',user.id);
updateStatusText(status);
}

function updateStatusText(status){
const map={
online:"🟢 В сети",
away:"🟡 Отошёл",
busy:"🔴 Занят",
coffee:"☕ Кофе",
study:"📖 Учусь"
};
document.getElementById('user-status-text').innerText=map[status]||"";
document.getElementById('current-mode').innerText=map[status]||"☕ Перерыв";
}

async function loadMyStatus(){
const {data}=await sb.from('profiles').select('status').eq('id',user.id).single();
if(data){
updateStatusText(data.status);
}
}

async function sendMsg(){
const msg=document.getElementById('chat-in').value;
if(!msg) return;

await sb.from('messages').insert({
content:msg,
user_id:user.id
});

document.getElementById('chat-in').value="";
loadMessages();
}

async function loadMessages(){
const {data}=await sb.from('messages').select('*').order('id',{ascending:false}).limit(20);

document.getElementById('chat-box').innerHTML=data.map(m=>`
<div class="chat-msg">
${m.content}<br>
<button onclick="deleteMessage('${m.id}')">🗑</button>
<button onclick="editMessage('${m.id}','${m.content}')">✏️</button>
</div>
`).join('');
}

async function deleteMessage(id){
if(!confirm("Удалить сообщение?")) return;

await sb.from('messages')
.delete()
.eq('id',id)
.eq('user_id',user.id);

loadMessages();
}

async function editMessage(id,oldText){
const newText=prompt("Редактировать:",oldText);
if(!newText) return;

await sb.from('messages')
.update({content:newText})
.eq('id',id)
.eq('user_id',user.id);

loadMessages();
}

init();
</script>

</body>
</html>
