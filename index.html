<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding-top: 40px;
            margin: 0;
        }

        .container {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h2 { margin-top: 0; margin-bottom: 15px; font-size: 1.5rem; }

        #myInfo { margin-bottom: 15px; color: #3b82f6; font-weight: bold; }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .green { background: #22c55e; }
        .orange { background: #f97316; }
        .red { background: #ef4444; }
        .blue { background: #3b82f6; }

        #loginBtn { background: #2563eb; width: 100%; margin-bottom: 10px; }
        #logoutBtn { background: #64748b; width: 100%; margin-top: 20px; }

        .hidden { display: none !important; }

        .user-item {
            display: flex;
            align-items: center;
            background: #f9fafb;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #edf2f7;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .username { font-weight: bold; color: #1f2937; }
        .status { font-size: 0.85rem; color: #6b7280; }
    </style>
</head>
<body>

<div class="container">
    <h2>👤 Мой профиль</h2>
    <div id="myInfo">Загрузка...</div>

    <div class="buttons hidden" id="statusButtons">
        <button class="green" data-status="Учусь">Учусь</button>
        <button class="orange" data-status="Кофе">Кофе</button>
        <button class="red" data-status="В игре">В игре</button>
        <button class="blue" data-status="Дома">Дома</button>
    </div>

    <button id="loginBtn">Войти через Google</button>
    
    <h2>👥 Группа</h2>
    <div id="grouplist">Загрузка списка...</div>

    <button id="logoutBtn" class="hidden">Выйти из аккаунта</button>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // КОНФИГУРАЦИЯ (Вставь свои данные)
    const SUPABASE_URL = 'https://uztmyzrkkjktpqabmbqj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let MY_ID = null;

    // ЭЛЕМЕНТЫ DOM
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const statusButtonsDiv = document.getElementById('statusButtons');
    const myInfo = document.getElementById('myInfo');
    const grouplist = document.getElementById('grouplist');

    // ЛОГИКА АВТОРИЗАЦИИ
    async function login() {
        await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href }
        });
    }

    async function logout() {
        if (MY_ID) {
            await supabase.from('profiles').update({ is_online: false }).eq('id', MY_ID);
        }
        await supabase.auth.signOut();
        location.reload();
    }

    // РАБОТА С ПРОФИЛЕМ
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();

        if (user) {
            MY_ID = user.id;
            myInfo.innerText = `Вы: ${user.user_metadata.full_name || user.email}`;
            
            loginBtn.classList.add('hidden');
            logoutBtn.classList.remove('hidden');
            statusButtonsDiv.classList.remove('hidden');

            // Получаем текущие данные, чтобы не затереть статус при входе
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', MY_ID).single();

            await supabase.from('profiles').upsert({
                id: MY_ID,
                username: user.user_metadata.full_name || user.email,
                is_online: true,
                status: profile?.status || '',
                study_start: profile?.study_start || null
            });

            fetchGroup();
        } else {
            myInfo.innerText = 'Не авторизован';
            loginBtn.classList.remove('hidden');
            fetchGroup(); // Показываем группу даже гостям
        }
    }

    // СМЕНА СТАТУСА
    async function changeStatus(text) {
        if (!MY_ID) return;

        const updateData = { 
            status: text,
            study_start: text === 'Учусь' ? new Date().toISOString() : null
        };

        const { error } = await supabase.from('profiles').update(updateData).eq('id', MY_ID);
        if (error) console.error("Ошибка обновления:", error);
        
        fetchGroup();
    }

    // ЗАГРУЗКА ГРУППЫ
    async function fetchGroup() {
        const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .order('is_online', { ascending: false })
            .order('username', { ascending: true });

        if (error) {
            grouplist.innerText = "Ошибка загрузки данных.";
            return;
        }

        const now = new Date();

        grouplist.innerHTML = data.map(user => {
            let timerHtml = '';
            if (user.status === 'Учусь' && user.study_start) {
                const diff = Math.floor((now - new Date(user.study_start)) / 1000);
                timerHtml = ` <span style="color: #ef4444; font-weight: bold;">⏱ ${formatTime(diff)}</span>`;
            }

            const dotColor = user.is_online ? '#22c55e' : '#9ca3af';

            return `
                <div class="user-item">
                    <div class="status-dot" style="background: ${dotColor}"></div>
                    <div>
                        <div class="username">${user.username} ${user.id === MY_ID ? '(Вы)' : ''}</div>
                        <div class="status">${user.status || 'Без статуса'}${timerHtml}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function formatTime(sec) {
        if (sec < 0) sec = 0;
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}м ${s}с`;
    }

    // СЛУШАТЕЛИ СОБЫТИЙ
    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);

    document.querySelectorAll('#statusButtons button').forEach(btn => {
        btn.addEventListener('click', () => changeStatus(btn.getAttribute('data-status')));
    });

    // Обработка закрытия вкладки
    window.addEventListener('beforeunload', () => {
        if (MY_ID) {
            // Используем navigator.sendBeacon или неасинхронный запрос, если нужно надежнее, 
            // но в Supabase проще полагаться на Realtime Presence.
            const blob = new Blob([JSON.stringify({ is_online: false })], { type: 'application/json' });
            // Это упрощенный пример, fetch в beforeunload часто блокируется.
        }
    });

    // СТАРТ
    checkUser();
    setInterval(fetchGroup, 2000); // Обновляем раз в 2 сек
</script>

</body>
</html>
