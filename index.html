<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статусы + Чат</title>

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#6366f1,#818cf8);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container {
  width:420px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* LOGIN SCREEN */
#loginScreen {
  text-align:center;
}

#loginScreen button {
  background:#3b82f6;
  color:white;
  padding:12px;
  border:none;
  border-radius:12px;
  width:100%;
  font-size:16px;
  cursor:pointer;
}

/* APP */
.hidden { display:none; }

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.name {
  font-weight:bold;
  color:#3b82f6;
}

.logout {
  background:#ef4444;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* STATUS */
.buttons {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}

button.status {
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.green{background:#22c55e;}
.orange{background:#f97316;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
.yellow{background:#FACC15;color:#111;}
.black{background:#111827;}

/* CHAT */
#chatBox {
  height:180px;
  overflow:auto;
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
}

.msg { margin-bottom:5px; }

.chatInput {
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.chatInput input {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* GROUP */
.user {
  display:flex;
  align-items:center;
  background:#f9fafb;
  padding:8px;
  border-radius:10px;
  margin-bottom:5px;
}

.dot {
  width:10px;height:10px;border-radius:50%;margin-right:8px;
}

.small {
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Добро пожаловать</h2>
  <button onclick="login()">Войти через Google</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="topbar">
  <div class="name" id="myName"></div>
  <button class="logout" onclick="logout()">Выйти</button>
</div>

<div class="buttons">
  <button class="status green" onclick="setStatus('Учусь')">Учусь</button>
  <button class="status orange" onclick="setStatus('Кофе')">Кофе</button>
  <button class="status red" onclick="setStatus('Игра')">Игра</button>
  <button class="status blue" onclick="setStatus('Дома')">Дома</button>
  <button class="status yellow" onclick="setStatus('Перерыв')">Перерыв</button>
  <button class="status black" onclick="stop()">Стоп</button>
</div>

<div id="chatBox"></div>

<div class="chatInput">
  <input id="msg" placeholder="Сообщение...">
  <button onclick="send()">></button>
</div>

<div id="group"></div>

</div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
'https://uztmyzrkkjktpqabmbqj.supabase.co',
'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj'
);

let uid=null,name='';

// LOGIN
window.login=()=>supabase.auth.signInWithOAuth({
 provider:'google',
 options:{redirectTo:location.href}
});

// LOGOUT
window.logout=async()=>{
 if(uid) await supabase.from('profiles').update({is_online:false}).eq('id',uid);
 await supabase.auth.signOut();
 location.reload();
};

// INIT
async function init(){
 const {data:{user}}=await supabase.auth.getUser();

 if(!user) return;

 uid=user.id;
 name=user.user_metadata.full_name;

 loginScreen.classList.add('hidden');
 app.classList.remove('hidden');

 myName.innerText=name;

 await supabase.from('profiles').upsert({
  id:uid, username:name, is_online:true
 });

 load();
}

// STATUS
window.setStatus=async(t)=>{
 await supabase.from('profiles')
  .update({status:t,status_start:new Date().toISOString()})
  .eq('id',uid);
};

window.stop=async()=>{
 await supabase.from('profiles')
  .update({status:'',status_start:null})
  .eq('id',uid);
};

// TIME
function time(s){
 const m=Math.floor(s/60);
 const sec=s%60;
 return m+'м '+sec+'с';
}

// SEND
window.send=async()=>{
 if(!msg.value)return;

 await supabase.from('messages').insert({
  user_id:uid, username:name, text:msg.value
 });

 msg.value='';
};

// LOAD
async function load(){
 const {data:users}=await supabase.from('profiles').select('*');
 const {data:msgs}=await supabase.from('messages').select('*').order('created_at',{ascending:false}).limit(20);

 const now=new Date();

 chatBox.innerHTML=msgs.reverse().map(m=>
  `<div class="msg"><b>${m.username}:</b> ${m.text}</div>`
 ).join('');

 group.innerHTML=users.map(u=>{
  let t='';
  if(u.status_start){
   let d=Math.floor((now-new Date(u.status_start))/1000);
   t=' ⏱ '+time(d);
  }

  return `
  <div class="user">
    <div class="dot" style="background:${u.is_online?'#22c55e':'gray'}"></div>
    <div>
      ${u.username}
      <div class="small">${u.status||'—'}${t}</div>
    </div>
  </div>`;
 }).join('');
}

setInterval(load,1000);
init();
</script>

</body>
</html>
