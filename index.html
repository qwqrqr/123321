<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Space Monitor PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090a10; --card: #11131a; --primary: #6366f1;
            --success: #10b981; --danger: #ef4444; --text: #f8fafc;
            --muted: #94a3b8; --border: rgba(255,255,255,0.08);
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            display: flex; justify-content: center; margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { 
            background: var(--bg-card); border-radius: 24px; padding: 25px; 
            width: 100%; max-width: 440px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background-color: var(--card);
        }

        /* Профиль и Значки */
        .header-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--primary); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        .badge-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .badge { background: rgba(99,102,241,0.1); color: var(--primary); font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(99,102,241,0.3); }

        /* Статистика */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border); }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-weight: 800; font-size: 1rem; color: var(--text); }
        .stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }

        /* Таймер и Кнопки */
        .session-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border); margin-bottom: 20px; }
        .timer { font-size: 2.2rem; font-weight: 800; margin: 10px 0; color: var(--success); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; color: white; font-size: 0.85rem; }
        .btn-start { background: var(--success); }
        .btn-stop { background: var(--danger); }
        .btn-status { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .btn-full { grid-column: span 2; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }

        /* Рейтинг */
        .user-row { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.01); border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); }
        .user-row.me { border-color: var(--primary); background: rgba(99,102,241,0.05); }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; }
        .u-info { flex: 1; }
        .u-name { font-weight: 700; font-size: 0.9rem; }
        .u-status { font-size: 0.75rem; color: var(--muted); }
        .u-score { text-align: right; font-weight: 800; font-size: 0.85rem; color: var(--primary); }

        .hidden { display: none; }
        h2 { font-size: 0.8rem; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin: 20px 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-ui">
        <h1 style="text-align:center;">Study Space</h1>
        <button class="btn-start btn-full" onclick="login()" style="background: var(--primary);">Войти через Google</button>
    </div>

    <div id="main-ui" class="hidden">
        <div class="header-profile">
            <div class="avatar" id="myAvatar">?</div>
            <div>
                <div id="myName" style="font-weight:800; font-size:1.1rem;">Загрузка...</div>
                <div id="myOnlineStatus" style="font-size:0.8rem; color: var(--success);">● В сети</div>
            </div>
        </div>

        <div class="badge-container" id="myBadges">
            </div>

        <div class="stats-grid">
            <div class="stat-item"><span id="s-time" class="stat-num">0м</span><span class="stat-label">Учёба</span></div>
            <div class="stat-item"><span id="s-sess" class="stat-num">0</span><span class="stat-label">Сессий</span></div>
            <div class="stat-item"><span id="s-msg" class="stat-num">0</span><span class="stat-label">Сообщ.</span></div>
            <div class="stat-item"><span id="s-ach" class="stat-num">0</span><span class="stat-label">Значки</span></div>
        </div>

        <div class="session-box">
            <h2>Сессия учебы</h2>
            <div class="timer" id="displayTimer">00:00</div>
            <div class="btn-grid">
                <button class="btn-start" onclick="startStudy()">Продолжить</button>
                <button class="btn-stop" onclick="stopStudy()">Завершить</button>
            </div>
        </div>

        <h2>Твой статус</h2>
        <div class="btn-grid" style="margin-bottom: 20px;">
            <button class="btn-status" onclick="setStatus('В сети')">В сети</button>
            <button class="btn-status" onclick="setStatus('Отошел')">Отошёл</button>
            <button class="btn-status" onclick="setStatus('Занят')">Занят</button>
            <button class="btn-status" onclick="setStatus('Не беспокоить')">DND</button>
        </div>

        <h2>🏆 Топ студентов</h2>
        <div id="rating-list"></div>

        <button class="btn-status btn-full" style="margin-top: 20px; color: var(--danger);" onclick="logout()">Выйти</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://uztmyzrkkjktpqabmbqj.supabase.co', 'sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj');

    let MY_ID = null;

    // --- АВТОРИЗАЦИЯ ---
    window.login = () => supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { queryParams: { prompt: 'select_account' }, redirectTo: window.location.href }
    });

    window.logout = async () => {
        await supabase.from('profiles').update({ is_online: false }).eq('id', MY_ID);
        await supabase.auth.signOut();
        location.reload();
    };

    async function init() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            MY_ID = user.id;
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('myName').innerText = user.user_metadata.full_name;
            document.getElementById('myAvatar').innerText = user.user_metadata.full_name.charAt(0);

            await supabase.from('profiles').upsert({ id: MY_ID, username: user.user_metadata.full_name, is_online: true });
            
            checkEarlyBird();
            loadData();
            setInterval(updateTimer, 1000);
            setInterval(loadData, 10000);
        }
    }

    // --- ЛОГИКА СЕССИЙ ---
    window.startStudy = async () => {
        await supabase.from('profiles').update({ status: '📚 Учусь', status_start: new Date().toISOString() }).eq('id', MY_ID);
    };

    window.stopStudy = async () => {
        const { data: p } = await supabase.from('profiles').select('*').eq('id', MY_ID).single();
        if (p.status_start) {
            const diffMin = Math.floor((new Date() - new Date(p.status_start)) / 60000);
            if (diffMin >= 120) awardBadge("Марафонец 🏃‍♂️");
            
            await supabase.from('profiles').update({ 
                status: 'Отдыхает', status_start: null,
                total_minutes: (p.total_minutes || 0) + diffMin,
                session_count: (p.session_count || 0) + 1
            }).eq('id', MY_ID);
            loadData();
        }
    };

    window.setStatus = async (s) => {
        await supabase.from('profiles').update({ status: s, status_start: null }).eq('id', MY_ID);
        document.getElementById('myOnlineStatus').innerText = `● ${s}`;
    };

    // --- ДОСТИЖЕНИЯ ---
    async function awardBadge(name) {
        await supabase.from('user_achievements').upsert({ user_id: MY_ID, achievement_name: name });
    }

    function checkEarlyBird() {
        if (new Date().getHours() < 8) awardBadge("Ранняя пташка 🌅");
    }

    // --- ОБНОВЛЕНИЕ ЭКРАНА ---
    async function updateTimer() {
        const { data } = await supabase.from('profiles').select('status_start, status').eq('id', MY_ID).single();
        if (data?.status_start && data.status === '📚 Учусь') {
            const diff = Math.floor((new Date() - new Date(data.status_start)) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('displayTimer').innerText = `${m}:${s}`;
        } else {
            document.getElementById('displayTimer').innerText = '00:00';
        }
    }

    async function loadData() {
        const { data: me } = await supabase.from('profiles').select('*').eq('id', MY_ID).single();
        const { data: myAchs } = await supabase.from('user_achievements').select('*').eq('user_id', MY_ID);
        
        document.getElementById('s-time').innerText = (me.total_minutes || 0) + 'м';
        document.getElementById('s-sess').innerText = me.session_count || 0;
        document.getElementById('s-msg').innerText = me.message_count || 0;
        document.getElementById('s-ach').innerText = myAchs.length;
        document.getElementById('myBadges').innerHTML = myAchs.map(a => `<div class="badge">${a.achievement_name}</div>`).join('');

        const { data: users } = await supabase.from('profiles').select('*').order('total_minutes', { ascending: false });
        document.getElementById('rating-list').innerHTML = users.map((u, i) => `
            <div class="user-row ${u.id === MY_ID ? 'me' : ''}">
                <div class="dot" style="background:${u.is_online ? '#10b981' : '#334155'}"></div>
                <div class="u-info">
                    <div class="u-name">${u.username} ${i === 0 ? '🏆' : ''}</div>
                    <div class="u-status">${u.status || 'Offline'}</div>
                </div>
                <div class="u-score">${u.total_minutes || 0} мин</div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
