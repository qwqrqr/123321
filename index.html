<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Группа</title>

<style>
body { font-family: Arial; padding: 20px; }
.user-item { display: flex; align-items: center; margin-bottom: 10px; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
button { margin: 5px; }
</style>

</head>
<body>

<h2>Мой профиль</h2>
<div id="myInfo"></div>

<div>
<button onclick="changeStatus('Учусь', 'green')">Учусь</button>
<button onclick="changeStatus('Кофе', 'orange')">Кофе</button>
<button onclick="changeStatus('В игре', 'red')">В игре</button>
<button onclick="changeStatus('Дома', 'blue')">Дома</button>
</div>

<h2>Монитор группы</h2>
<div id="grouplist"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const URL = 'https://rncerhgizyjhovbdpqnl.supabase.co';
const KEY = 'sb_publishable_ThtftS6uBeaKf8FyndIFTg_00HMJ5yh';

const supabase = createClient(URL, KEY);

const MY_ID = 'ce12600c-861e-4bf4-a856-fbd16adad257';

window.changeStatus = async (text, color) => {
  const { error } = await supabase
    .from('profiles')
    .update({ status: text, color: color })
    .eq('id', MY_ID);

  if (error) {
    alert("Ошибка!");
    console.error(error);
  } else {
    fetchGroup();
  }
};

async function fetchGroup() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const list = document.getElementById('grouplist');

  list.innerHTML = data.map(user => `
    <div class="user-item">
      <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
      <div style="flex-grow: 1;">
        <strong>${user.username}</strong><br>
        <small style="color: #666;">
          ${user.status || "Статус не задан"}
        </small>
      </div>
    </div>
  `).join('');

  const me = data.find(u => u.id === MY_ID);

  if (me) {
    document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
  }
}

fetchGroup();
setInterval(fetchGroup, 5000);
</script>

</body>
</html>
