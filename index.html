<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Monitor - Группы</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1a1d29;
            --accent: #22c55e;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --gradient: linear-gradient(135deg, #3b82f6, #22c55e);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .monitor-container {
            width: 100%;
            max-width: 450px;
        }

        h1 { font-size: 24px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        h1 span { color: #3b82f6; }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }

        .timer-display {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            color: var(--accent);
            margin: 15px 0;
        }
        .timer-display span { font-size: 18px; color: var(--text-dim); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-start { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .btn-stop { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .btn-exit { background: #2d313f; color: var(--text-dim); grid-column: span 2; margin-top: 5px; }

        .mini-stats { display: flex; justify-content: space-around; text-align: center; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .stat-box b { display: block; font-size: 18px; }
        .stat-box span { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        .avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        
        .user-info p { margin: 0; font-size: 16px; font-weight: 600; }
        .user-info .email-text { font-size: 12px; color: #64748b; margin-top: 2px; display: block; }
        .user-info .status-text { font-size: 11px; color: var(--accent); margin-top: 4px; display: block; }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #auth-screen { text-align: center; margin-top: 100px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="monitor-container">
    
    <div id="auth-screen" class="hidden">
        <h1>REALTIME <span>MONITOR</span></h1>
        <div class="card">
            <p style="color: var(--text-dim)">Войдите через Google для начала сессии</p>
            <button class="btn btn-start" onclick="login()" style="width: 100%; margin-top: 15px;">
                <i class="fa-brands fa-google"></i> Войти через Google
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <h1>Статусы <span>группы</span></h1>

        <div class="card">
            <span class="label">Текущая сессия</span>
            <div style="text-align: center;">
                <p id="profile-name-top" style="margin: 0; font-weight: 600; font-size: 18px;">Загрузка...</p>
                <div class="timer-display"><i class="fa-solid fa-stopwatch-20"></i> <span id="timer-val">0</span> <span>сек.</span></div>
                <div style="color: #fbbf24; font-size: 11px; margin-bottom: 15px; font-weight: bold;">
                    <i class="fa-solid fa-fire"></i> В ПРОЦЕССЕ УЧЁБЫ
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-start" onclick="startTimer()"><i class="fa-solid fa-play"></i> Продолжить</button>
                <button class="btn btn-stop" onclick="stopTimer()"><i class="fa-solid fa-pause"></i> Пауза</button>
                <button class="btn btn-exit" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Выйти из аккаунта</button>
            </div>
        </div>

        <div class="card">
            <span class="label">Ваш профиль</span>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="avatar" id="user-avatar">?</div>
                <div class="user-info">
                    <p id="user-display-name">Загрузка...</p>
                    <span id="user-email" class="email-text">example@gmail.com</span>
                    <span class="status-text">● В сети</span>
                </div>
            </div>
            
            <div class="mini-stats">
                <div class="stat-box"><b id="total-time-val">0м</b><span>Учеба</span></div>
                <div class="stat-box"><b>1</b><span>Сессия</span></div>
                <div class="stat-box"><b>0</b><span>Сообщ.</span></div>
                <div class="stat-box"><b>2</b><span>Достиж.</span></div>
            </div>
        </div>

        <div class="card">
            <span class="label">Топ студентов</span>
            <div id="leaderboard-list">
                </div>
        </div>
    </div>
</div>

<script>
    // ТВОИ ДАННЫЕ SUPABASE
    const SB_URL = "https://uztmyzrkkjktpqabmbqj.supabase.co";
    const SB_KEY = "sb_publishable_NCWb9-WFsrXDtkYruYcnsA_RQgmQSsj";
    
    const { createClient } = supabase;
    const sb = createClient(SB_URL, SB_KEY);

    let user = null;
    let timerInterval = null;
    let seconds = 0;

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            user = session.user;
            showApp();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    }

    async function login() {
        await sb.auth.signInWithOAuth({ 
            provider: 'google', 
            options: { redirectTo: window.location.href } 
        });
    }

    async function logout() {
        await sb.auth.signOut();
        window.location.reload();
    }

    async function showApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');

        // 1. Получаем email и имя из объекта пользователя Google
        const userEmail = user.email;
        const userName = user.user_metadata.full_name || user.email.split('@')[0];

        // 2. Отображаем в интерфейсе
        document.getElementById('user-email').innerText = userEmail;
        document.getElementById('user-display-name').innerText = userName;
        document.getElementById('profile-name-top').innerText = userName;
        document.getElementById('user-avatar').innerText = userName[0].toUpperCase();

        // 3. Синхронизируем с таблицей Profiles в Supabase
        let { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
        
        if (!profile) {
            // Если зашел впервые - создаем запись
            await sb.from('profiles').insert([
                { id: user.id, username: userName, status: 'online' }
            ]);
        }

        document.getElementById('total-time-val').innerText = (profile?.total_study_time || 0) + 'м';
        loadLeaderboard();
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timer-val').innerText = seconds;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    async function loadLeaderboard() {
        const { data } = await sb.from('profiles').select('*').order('total_study_time', { ascending: false }).limit(5);
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = data.map(u => `
            <div class="leaderboard-item">
                <div class="avatar" style="width:30px; height:30px; font-size:14px;">${u.username[0].toUpperCase()}</div>
                <div class="user-info">
                    <p style="font-size:13px;">${u.username}</p>
                    <span style="font-size:10px;">Суммарно: ${u.total_study_time} мин.</span>
                </div>
                <div style="color: #3b82f6; font-weight: bold;">🏆</div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
